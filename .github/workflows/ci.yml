name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  
env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: ユニットテスト + カバレッジチェック（80%未満でFAIL）
  # ─────────────────────────────────────────────────────────────
  unit-test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npx vitest run --coverage
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-not-for-production

      - name: カバレッジ閾値チェック（行カバレッジ 80% 以上）
        run: |
          COVERAGE_FILE="coverage/coverage-summary.json"
          if [ ! -f "$COVERAGE_FILE" ]; then
            echo "::warning::カバレッジレポートが見つかりません。vitest --coverage が正しく設定されているか確認してください。"
            exit 0
          fi
          LINES=$(node -e "const c=require('./$COVERAGE_FILE'); console.log(c.total.lines.pct)")
          echo "行カバレッジ: ${LINES}%"
          node -e "
            const pct = parseFloat('$LINES');
            if (pct < 80) {
              console.error('行カバレッジが 80% を下回っています: ' + pct + '%');
              process.exit(1);
            }
            console.log('カバレッジ OK: ' + pct + '%');
          "

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────
  # Job 2: E2E テスト（Playwright / Chromium）
  # ─────────────────────────────────────────────────────────────
  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: unit-test
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: transaction_db_test
          POSTGRES_USER: app_user
          POSTGRES_PASSWORD: ci_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app_user -d transaction_db_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: データベースマイグレーション実行
        run: npm run db:migrate
        env:
          DATABASE_URL: postgres://app_user:ci_test_password@localhost:5432/transaction_db_test

      - name: DBスキーマ確認
        run: |
          node --input-type=module -e "
            import postgres from 'postgres';
            const sql = postgres(process.env.DATABASE_URL, { max: 1 });
            try {
              await sql\`SELECT 1 FROM users LIMIT 1\`;
              console.log('schema OK');
            } catch (e) {
              console.error(e.message);
              process.exitCode = 1;
            } finally {
              await sql.end();
            }
          "
        env:
          DATABASE_URL: postgres://app_user:ci_test_password@localhost:5432/transaction_db_test

      - name: バックエンドサーバー起動
        run: node server/index.js &
        env:
          NODE_ENV: test
          PORT: 3000
          JWT_SECRET: ci-test-secret-not-for-production
          CORS_ORIGIN: http://localhost:5173
          RATE_LIMIT_MAX: 1000
          LOG_LEVEL: warn

      - name: バックエンドの起動待機
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/health && break || sleep 2
          done

      - name: Run E2E tests
        run: npx playwright test
        env:
          NODE_ENV: test
          E2E_SCREENSHOT: on

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: e2e-report/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # Job 3: ステージングデプロイ（main ブランチのみ）
  # ─────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [unit-test, e2e-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: staging
      url: https://staging.example.com

    steps:
      - uses: actions/checkout@v4

      - name: ステージングサーバーへデプロイ
        run: ./scripts/deploy-staging.sh
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}

      - name: ヘルスチェック確認
        run: |
          sleep 15
          curl -sf https://staging.example.com/api/health \
            && echo "デプロイ成功: ヘルスチェックOK" \
            || (echo "ヘルスチェック失敗" && exit 1)
