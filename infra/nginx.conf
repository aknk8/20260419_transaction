# nginx リバースプロキシ設定（INF-03）
# Let's Encrypt / certbot と組み合わせて使用する

# HTTP → HTTPS リダイレクト
server {
    listen 80;
    server_name ${DOMAIN};

    # certbot の ACME チャレンジ用（証明書取得・更新に必要）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS（本番・ステージング）
server {
    listen 443 ssl;
    http2 on;
    server_name ${DOMAIN};

    # Let's Encrypt 証明書（certbot が自動更新）
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

    # TLS 設定（強固な暗号スイートのみ許可）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS（6か月間、サブドメイン含む）
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    # セキュリティヘッダー（アプリ側の @fastify/helmet と重複しない範囲で設定）
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # バックエンド API へのプロキシ
    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # タイムアウト
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ヘルスチェックエンドポイント（nginx 側で直接許可）
    location /api/health {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        access_log off;
    }
}
