services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: transaction_db_staging
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d transaction_db_staging"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      target: production
    environment:
      DATABASE_URL: postgres://app_user:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/transaction_db_staging
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      NODE_ENV: staging
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-https://staging.example.com}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      APPROVAL_STALE_DAYS: ${APPROVAL_STALE_DAYS:-3}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - app
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

volumes:
  postgres_staging_data:
